  # used by the custom dataset implementations shipped in this repo.
  data_source: esp_data
  dataset: beans_next
  default_split: crow-description
  subsets:
    - crow-description
    - zebra-description
    - f0-mean-seen-taxa
    - f0-mean-heldout-taxa
    - bird-presence
    - mammal-presence
    - insect-presence
    - amphibian-presence
    - alarm-call-presence
    - flight-call-presence
    - call-type-fixed-vocab
