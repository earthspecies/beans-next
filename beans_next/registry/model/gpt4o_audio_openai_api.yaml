name: gpt4o_audio_openai_api
description: GPT-4o-audio-preview via OpenAI API, proxied through the openai_compatible_proxy launcher.

predict_url: http://localhost:8000/predict
info_url: http://localhost:8000/info
health_url: http://localhost:8000/health

response_schema: predictions_v1
audio_payload: base64_wav

auth: {}

# Launch with:
#   OPENAI_PROXY_STUB=0 \
#   OPENAI_BASE_URL=https://api.openai.com \
#   OPENAI_API_KEY=sk-... \
#   OPENAI_MODEL=gpt-4o-audio-preview \
#   PORT=8000 examples/servers/openai_compatible_proxy/serve.sh
