name: gemini_openai_api
description: Gemini model via Google's OpenAI-compatible endpoint, proxied through the openai_compatible_proxy launcher.

predict_url: http://localhost:8000/predict
info_url: http://localhost:8000/info
health_url: http://localhost:8000/health

response_schema: predictions_v1
audio_payload: base64_wav

auth: {}

# Launch with:
#   OPENAI_PROXY_STUB=0 \
#   OPENAI_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai \
#   OPENAI_API_KEY=<google-ai-studio-key> \
#   OPENAI_MODEL=gemini-3.1-pro-preview \
#   OPENAI_PROXY_CANONICALIZE_WAV=1 \
#   OPENAI_PROXY_MAX_AUDIO_SECONDS=30 \
#   PORT=8000 examples/servers/openai_compatible_proxy/serve.sh
