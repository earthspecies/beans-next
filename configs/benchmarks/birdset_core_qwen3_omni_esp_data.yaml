# Full BirdSet core evaluation (all 8 subsets) — Qwen3-Omni via vLLM adapter (esp_data)
#
# Run:
#   uv run beans-next run --config configs/benchmarks/birdset_core_qwen3_omni_esp_data.yaml \
#     --predict-url http://<launcher-host>:<port>/predict \
#     -o results/birdset_qwen3_omni_$(date +%Y%m%d)
#
# Prereqs: Qwen3-Omni vLLM launcher (examples/slurm/serve_qwen3_omni.sh).

models:
  - inline:
      name: "qwen3-omni"
      description: "Qwen3-Omni via vLLM adapter (local)"
      predict_url: http://127.0.0.1:8000/predict
      info_url: http://127.0.0.1:8000/info
      health_url: http://127.0.0.1:8000/health
      response_schema: predictions_v1
      audio_payload: base64_wav
      retry_policy:
        max_attempts: 12
        backoff_initial: 0.5
        backoff_max: 10.0

suite: birdset_core
data_source: esp_data
