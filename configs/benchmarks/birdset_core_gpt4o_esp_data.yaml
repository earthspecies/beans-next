# Full BirdSet core evaluation (all 8 subsets) — GPT-4o audio via OpenAI-compatible proxy (esp_data)
#
# Run:
#   uv run beans-next run --config configs/benchmarks/birdset_core_gpt4o_esp_data.yaml \
#     -o results/birdset_gpt4o_esp_data_$(date +%Y%m%d)
#
# Prereqs: OpenAI-compatible proxy running locally (example port 8000)
#   cd examples/servers/openai_compatible_proxy
#   PORT=8000 OPENAI_MODEL=gpt-4o-audio-preview ./serve.sh

models:
  - inline:
      name: "gpt4o"
      description: "GPT-4o audio via OpenAI-compatible proxy (local)"
      predict_url: http://127.0.0.1:8000/predict
      info_url: http://127.0.0.1:8000/info
      health_url: http://127.0.0.1:8000/health
      response_schema: predictions_v1
      audio_payload: base64_wav
      retry_policy:
        max_attempts: 12
        backoff_initial: 0.5
        backoff_max: 10.0

suite: birdset_core
data_source: esp_data
