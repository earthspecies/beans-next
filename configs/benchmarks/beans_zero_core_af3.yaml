# Full BEANS-Zero core evaluation — Audio Flamingo Next
#
# Prereqs: launcher running on port 8000
#   cd examples/servers/af3
#   HF_HOME=/scratch/shared/hf_cache PORT=8000 ./serve.sh
#
# License: NVIDIA OneWay Noncommercial License — research use only.
#
# Run:
#   uv run beans-next run --config configs/benchmarks/beans_zero_core_af3.yaml \
#     -o results/af3_$(date +%Y%m%d)

models:
  - inline:
      name: "af3"
      description: "Audio Flamingo Next (local launcher)"
      predict_url: http://127.0.0.1:8000/predict
      info_url: http://127.0.0.1:8000/info
      health_url: http://127.0.0.1:8000/health
      response_schema: predictions_v1
      audio_payload: base64_wav

suite: beans_zero_core
data_source: hf
