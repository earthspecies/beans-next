# Full BirdSet core evaluation (all 8 subsets) — Audio Flamingo Next (esp_data)
#
# Run:
#   uv run beans-next run --config configs/benchmarks/birdset_core_af3_esp_data.yaml \
#     -o results/birdset_af3_esp_data_$(date +%Y%m%d)
#
# Prereqs: launcher running locally (example port 8000)
#   cd examples/servers/af3
#   HF_HOME=/scratch/shared/hf_cache PORT=8000 ./serve.sh

models:
  - inline:
      name: "af3"
      description: "Audio Flamingo Next (local launcher)"
      predict_url: http://127.0.0.1:8000/predict
      info_url: http://127.0.0.1:8000/info
      health_url: http://127.0.0.1:8000/health
      response_schema: predictions_v1
      audio_payload: base64_wav
      retry_policy:
        max_attempts: 12
        backoff_initial: 0.5
        backoff_max: 10.0

suite: birdset_core
data_source: esp_data
