# Increment 13 benchmark: ESC-50 "official" protocol via OpenAI-compatible proxy (real Gemini)
#
# This is a **run-config** file consumed by:
#   uv run beans-next run --config <this_file>
#
# It is intended to be used with the local `openai_compatible_proxy` launcher running on:
#   http://127.0.0.1:19085
#
# Notes
# -----
# - This config does **not** embed secrets. Provide Gemini credentials to the launcher via env vars.
# - Default scope is minimal (`limit: 1`). For a slightly larger smoke test, change to `limit: 5`.
#
# Launcher env vars (real mode; not consumed by beans-next)
# -------------------------------------------------------
# - OPENAI_PROXY_STUB=0
# - OPENAI_BASE_URL=https://generativelanguage.googleapis.com/v1beta/openai/
# - OPENAI_API_KEY=<google-ai-studio-key>
#   (or GEMINI_API_KEY / GOOGLE_API_KEY, optionally from ~/.config/gemini/cfg)
# - OPENAI_MODEL=gemini-3.1-pro-preview  (or another Gemini model id)
# - OPENAI_PROXY_CANONICALIZE_WAV=1
# - OPENAI_PROXY_MAX_AUDIO_SECONDS=30
# - Optional: OPENAI_MODEL_REVISION, OPENAI_AUTH_HEADER, OPENAI_PROXY_TIMEOUT_SEC, OPENAI_PROXY_RETRIES
#
# Reference (high-level): Google's Gemini API provides an OpenAI-compatible `chat/completions`
# surface under the `/v1beta/openai/` base URL (2026).
#

models:
  - inline:
      predict_url: http://127.0.0.1:19085/predict
      info_url: http://127.0.0.1:19085/info
      health_url: http://127.0.0.1:19085/health
      response_schema: predictions_v1
      audio_payload: base64_wav

tasks:
  - beans_zero_esc50_official

limit: 1
data_source: hf

