# Full BirdSet core evaluation (all 8 subsets) — Gemini via OpenAI-compatible proxy (esp_data)
#
# Run:
#   uv run beans-next run --config configs/benchmarks/birdset_core_gemini_esp_data.yaml \
#     -o results/birdset_gemini_esp_data_$(date +%Y%m%d)
#
# Prereqs: OpenAI-compatible proxy running locally (example port 8000)
#   cd examples/servers/openai_compatible_proxy
#   PORT=8000 OPENAI_BASE_URL="https://generativelanguage.googleapis.com/v1beta/openai" \
#     OPENAI_MODEL="gemini-2.5-pro" ./serve.sh

models:
  - inline:
      name: "gemini"
      description: "Gemini via OpenAI-compatible proxy (local)"
      predict_url: http://127.0.0.1:8000/predict
      info_url: http://127.0.0.1:8000/info
      health_url: http://127.0.0.1:8000/health
      response_schema: predictions_v1
      audio_payload: base64_wav

suite: birdset_core
data_source: esp_data
