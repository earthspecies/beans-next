# Single-H100 text-output config for Qwen3-Omni-MoE-Thinking.
#
# This is adapted from vLLM-Omni's qwen3_omni_moe_thinking.yaml example,
# but runs one thinker stage on device 0 with no tensor parallelism. Use it
# for BEANS-Next audio understanding tasks such as ESC-50, where we do not
# need the Instruct model's talker/code2wav audio-output stages.
stage_args:
  - stage_id: 0
    runtime:
      devices: "0"
    engine_args:
      model_stage: thinker
      max_num_seqs: 1
      model_arch: Qwen3OmniMoeForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.9
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: text
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      hf_config_name: thinker_config
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 42
      detokenize: true
      repetition_penalty: 1.05
